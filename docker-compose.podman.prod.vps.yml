services:
  kafka:
    image: apache/kafka:3.8.0
    hostname: kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092,PLAINTEXT_HOST://127.0.0.1:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=1
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=eventra
      - POSTGRES_USER=eventra
      - POSTGRES_PASSWORD=eventra
    volumes:
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventra -d eventra"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.prod
    environment:
      - KAFKA_BROKERS=127.0.0.1:9092
      - POSTGRES_URL=postgresql://eventra:eventra@127.0.0.1:5432/eventra
      - REDIS_URL=redis://127.0.0.1:6379
      - PORT=3001
    restart: unless-stopped
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  rule-engine:
    build:
      context: .
      dockerfile: services/rule-engine/Dockerfile
    env_file:
      - .env.prod
    environment:
      - KAFKA_BROKERS=127.0.0.1:9092
      - POSTGRES_URL=postgresql://eventra:eventra@127.0.0.1:5432/eventra
      - REDIS_URL=redis://127.0.0.1:6379
      - RULE_ENGINE_HEALTH_PORT=3002
    restart: unless-stopped
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: https://${API_DOMAIN}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      api:
        condition: service_started

  cache-loader:
    build:
      context: .
      dockerfile: apps/cache-loader/Dockerfile
    env_file:
      - .env.prod
    environment:
      - CACHE_LOADER_PORT=3010
      - POSTGRES_URL=postgresql://eventra:eventra@127.0.0.1:5432/eventra
      - CACHE_LOADER_METADATA_DB_URL=postgresql://eventra:eventra@127.0.0.1:5432/eventra
      - REDIS_URL=redis://127.0.0.1:6379
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
